<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="d-flex justify-content-center bg-light">
    <div style="width: 100%; max-width: 500px; background: #fff; min-height: 100vh;">
        <div class="bg-dark text-white p-3"><h5>Contests</h5></div>
        <div class="p-3">
            <div class="card p-3 mb-3 shadow-sm border-0" style="border-left: 5px solid #e11d48 !important;">
                <div class="d-flex justify-content-between">
                    <span>Prize Pool</span>
                    <span class="text-success fw-bold">Entry ₹49</span>
                </div>
                <h3 class="my-2">₹10 Crores</h3>
                <div class="progress mb-2" style="height: 8px;"><div class="progress-bar bg-danger" style="width: 70%"></div></div>
                <small class="text-muted">3,45,000 spots left</small>
                <button class="btn btn-dream mt-3" onclick="alert('Successfully Joined!')">JOIN CONTEST</button>
            </div>
        </div>
    </div>
</body>
</html>
