<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .badge-active { background-color: #000 !important; color: #fff !important; border-color: #000 !important; }
        .c-badge, .vc-badge { 
            width: 35px; height: 35px; display: inline-flex; align-items: center; 
            justify-content: center; border: 2px solid #ccc; border-radius: 50%; 
            cursor: pointer; font-weight: bold; margin-left: 10px; background: #fff;
        }
        #success-screen { display: none; padding: 20px; text-align: center; }
        .final-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body class="d-flex justify-content-center">
    <div style="width: 100%; max-width: 500px; background: #fff; min-height: 100vh;">
        
        <div id="selection-screen">
            <div class="bg-dark text-white p-4 text-center">
                <h5>Choose C & VC</h5>
                <small>Select your leaders for IND vs AUS</small>
            </div>
            <div id="final-list" class="p-3"></div>
            <div class="p-3">
                <button class="btn btn-success w-100 fw-bold" onclick="showMyTeam()">SAVE & VIEW TEAM</button>
            </div>
        </div>

        <div id="success-screen">
            <h3 class="text-success">🎉 Team Created!</h3>
            <p class="text-muted">Here is your final 11 for IND vs AUS</p>
            <div id="team-display" class="border rounded mb-4"></div>
            <button class="btn btn-primary w-100" onclick="window.location.href='/'">CREATE ANOTHER TEAM</button>
        </div>

    </div>

    <script>
        var teamData = JSON.parse(localStorage.getItem('finalTeamData') || '[]');
        var listDiv = document.getElementById('final-list');
        var cId = null; var vcId = null;

        function renderSelection() {
            listDiv.innerHTML = '';
            teamData.forEach(p => {
                var cAct = (cId == p.id) ? 'badge-active' : '';
                var vcAct = (vcId == p.id) ? 'badge-active' : '';
                
                var html = '<div class="player-card d-flex justify-content-between align-items-center p-3 border mb-2">';
                html += '<span><b>' + p.name + '</b> (' + p.role + ')</span>';
                html += '<div>';
                html += '<span class="c-badge ' + cAct + '" onclick="setRole(\'' + p.id + '\',\'C\')">C</span>';
                html += '<span class="vc-badge ' + vcAct + '" onclick="setRole(\'' + p.id + '\',\'VC\')">VC</span>';
                html += '</div></div>';
                listDiv.innerHTML += html;
            });
        }

        window.setRole = function(id, type) {
            if(type === 'C') { if(vcId == id) vcId = null; cId = id; }
            else { if(cId == id) cId = null; vcId = id; }
            renderSelection();
        };

        function showMyTeam() {
            if(!cId || !vcId) return alert("Please select C and VC first!");
            
            // Hide selection, show success screen
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
            
            var display = document.getElementById('team-display');
            display.innerHTML = '';
            
            teamData.forEach(p => {
                var roleTag = "";
                if(p.id == cId) roleTag = '<span class="badge bg-primary">CAPTAIN</span>';
                if(p.id == vcId) roleTag = '<span class="badge bg-danger">VICE-CAPTAIN</span>';
                
                display.innerHTML += '<div class="final-row"><span>' + p.name + '</span>' + roleTag + '</div>';
            });
        }

        renderSelection();
    </script>
</body>
</html>
